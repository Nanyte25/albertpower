- year: "1881"
  title: "Born in Dublin"
  title_ga: "Rugadh i mBaile Átha Cliath"
  title_fi: "Syntyi Dublinissa"
  description: "Albert George Power is born in the city that will define his artistic life, in the final decades of Victorian Ireland."
  image: "https://catholicarchives.ie/uploads/r/irish-capuchin-archives-2/d/9/2/d92e752038c424dec0f476ea3180864af99d1f3d4e1dc5d2ce313882b768096a/CA_CP-3-16-8-20-1.jpg"
  image_caption: "Albert G. Power. Irish Capuchin Archives."

- year: "1898"
  title: "Book Prize, DMSA"
  title_ga: "Duais Leabhair, DMSA"
  title_fi: "Kirjapalkinto, DMSA"
  description: "Wins a book prize at the Dublin Metropolitan School of Art for success in the Special Local Competition — the beginning of a distinguished student career."
  image: ""
  image_caption: ""

- year: "c. 1900"
  title: "Dublin Metropolitan School of Art"
  title_ga: "Scoil Ealaíne Mheitreapóil Bhaile Átha Cliath"
  title_fi: "Dublinin taidekoulu"
  description: "Studies under John Hughes and Oliver Sheppard. Classmates include Kathleen Fox, Willie Pearse, Grace Gifford, and Countess Markievicz."
  image: "https://catholicarchives.ie/uploads/r/irish-capuchin-archives-2/b/9/c/b9cc9845d5323040e8aaf6588ec45a737cfaab42af8f406e8aff59b0289f1b07/CA_CP-3-16-8-20-4.jpg"
  image_caption: "Albert Power at work. Irish Capuchin Archives."

- year: "1909"
  title: "Mother and Child"
  title_ga: "Máthair agus Leanbh"
  title_fi: "Äiti ja lapsi"
  description: "Early bronze Mother and Child — one of his first exhibited works to attract serious critical attention. Private collection."
  image: ""
  image_caption: ""

- year: "1911"
  title: "Figure of Science, Government Buildings"
  title_ga: "Figiúr na hEolaíochta, Foirgnimh an Rialtais"
  title_fi: "Tieteen hahmo, valtion rakennukset"
  description: "Major architectural commission — a full-length figure for the facade of Government Buildings, Merrion Street, Dublin."
  image: ""
  image_caption: ""

- year: "1919"
  title: "Elected RHA"
  title_ga: "Toghadh ina bhall den RHA"
  title_fi: "Valittiin RHA:n jäseneksi"
  description: "Elected full member of the Royal Hibernian Academy, cementing his standing as one of Ireland's foremost sculptors."
  image: "https://catholicarchives.ie/uploads/r/irish-capuchin-archives-2/b/e/7/be78de9163f20ec1ad49fcb36816d165a41758a8b206f92deb835bf7bad2199f/CA_CP-3-16-8-20-5.jpg"
  image_caption: "Albert Power at an exhibition. Irish Capuchin Archives."

- year: "1922"
  title: "The Death Mask Summer"
  title_ga: "Samhradh na Masc Báis"
  title_fi: "Kuolinaamioiden kesä"
  description: "In the space of weeks Power makes death masks of Cathal Brugha (July), Arthur Griffith (August) and Michael Collins (August) — three leaders dead at the birth of the Free State."
  image: "/assets/images/collins-death-mask.jpg"
  image_caption: "Death Mask of Michael Collins, 1922."

- year: "1926"
  title: "Gresham Hotel Facade"
  title_ga: "Aghaidh Óstán Gresham"
  title_fi: "Gresham-hotellin julkisivu"
  description: "Urns, sphinxes, coat of arms and festoons for the rebuilt Gresham Hotel — seen daily by everyone who walks O'Connell Street."
  image: "/assets/images/gresham-hotel-facade.jpg"
  image_caption: "Gresham Hotel, O'Connell Street."

- year: "1935"
  title: "Pádraic Ó Conaire Memorial"
  title_ga: "Leacht Cuimhneacháin Phádraic Uí Chonaire"
  title_fi: "Pádraic Ó Conairen muistomerkki"
  description: "The Galway commission is unveiled in Eyre Square in Durrow limestone — the first time a native stone was used for such a purpose. 10,000 people attend the Liam Lynch unveiling the same year."
  image: "/assets/images/o-conaire-memorial.jpg"
  image_caption: "Pádraic Ó Conaire memorial, Eyre Square, Galway."

- year: "1937"
  title: "Bishop Gillooly, Sligo"
  title_ga: "Easpag Gillooly, Sligeach"
  title_fi: "Piispa Gillooly, Sligo"
  description: "Full-length limestone figure of Bishop Laurence Gillooly for the Community Hall in Sligo town, completed in April and unveiled in May."
  image: ""
  image_caption: ""

- year: "1938"
  title: "Robert Emmet Plaque & Thomas Kettle Monument"
  title_ga: "Plaic Robert Emmet & Leacht Thomas Kettle"
  title_fi: "Robert Emmet -laatta ja Thomas Kettle -muistomerkki"
  description: "Bronze relief of Robert Emmet for Emmet Bridge, Harold's Cross — inscription carved by his son Oliver. The Thomas Kettle monument in St Stephen's Green finally erected after 21 years."
  image: ""
  image_caption: ""

- year: "1939"
  title: "W.B. Yeats Portrait & Tralee Pikeman"
  title_ga: "Portráid W.B. Yeats & Piocamán Thrá Lí"
  title_fi: "W.B. Yeatsin muotokuva ja Traleen pikimiesmies"
  description: "Bronze portrait of W.B. Yeats for the National Gallery. Limestone Pikeman for Denny Street, Tralee — replacing one toppled by the Black and Tans in 1921. St Patrick carved for Skerries church — with a hidden goat."
  image: "/assets/images/wb-yeats.jpg"
  image_caption: "Portrait of W.B. Yeats, 1939. National Gallery of Ireland."

- year: "1945"
  title: "Death in Dublin"
  title_ga: "Bás i mBaile Átha Cliath"
  title_fi: "Kuolema Dublinissa"
  description: "Power dies in July 1945. His final work — the Sacred Heart for Carndonagh church, Co. Donegal — was photographed in progress in his Berkeley Road yard. The Irish Press calls him 'one of our greatest sculptors.'"
  image: "https://catholicarchives.ie/uploads/r/irish-capuchin-archives-2/b/9/c/b9cc9845d5323040e8aaf6588ec45a737cfaab42af8f406e8aff59b0289f1b07/CA_CP-3-16-8-20-4.jpg"
  image_caption: "Albert Power at work. Irish Capuchin Archives."
