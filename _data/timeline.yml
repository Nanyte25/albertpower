- year: "1881"
  title: "Born in Dublin"
  description: "Albert George Power is born in the city that will define his artistic life, in the final decades of Victorian Ireland."

- year: "c. 1900"
  title: "Dublin Metropolitan School of Art"
  description: "Begins formal training, studying under Oliver Sheppard — the central figure of Irish Revival sculpture."

- year: "1916"
  title: "The Rising & Its Aftermath"
  description: "The Easter Rising reshapes the cultural landscape of Ireland. Power's circle includes many figures at the heart of the national movement."

- year: "1919"
  title: "Elected RHA"
  description: "Elected full member of the Royal Hibernian Academy, cementing his standing as one of Ireland's foremost sculptors."

- year: "c. 1922"
  title: "Michael Collins Portrait"
  description: "Creates one of the defining portrait busts of the revolutionary leader, shortly after Collins's death in the Civil War."

- year: "1935"
  title: "Pádraic Ó Conaire Memorial"
  description: "The Galway commission is unveiled in Eyre Square. It will become one of the most beloved public sculptures in Ireland."

- year: "1945"
  title: "Death in Dublin"
  description: "Power dies, leaving a legacy in bronze and stone that endures across the parishes, galleries, and civic squares of Ireland."
