title: "Albert G. Power RHA"
description: "A memorial archive dedicated to Albert George Power RHA (1881–1945), one of the foremost Irish sculptors of the twentieth century."
url: "https://albertpower.org"
baseurl: ""

author:
  name: "Mark Freer"
  email: "freer.mark@gmail.com"

markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-last-modified-at

# SEO — used by jekyll-seo-tag
logo: /assets/images/albert-power-portrait.jpg
social:
  name: Albert G. Power RHA
  links:
    - https://github.com/Nanyte25/albertpower

collections:
  works:
    output: true
    permalink: /works/:name/

defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/albert-power-portrait.jpg
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Power Family Archive"
  - scope:
      path: ""
      type: "works"
    values:
      layout: "work"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .git
  - vendor/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - setup.sh
  - install-deps.sh
  - .research_cache.json
  - .setup_state
