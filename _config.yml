title: "Albert G. Power RHA"
description: "A memorial archive dedicated to Albert George Power RHA (1881–1945), one of the foremost Irish sculptors of the twentieth century."
url: "https://abertpower.org"
baseurl: ""

author:
  name: "Power Family Archive"
  email: "archive@abertpower.org"

markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

collections:
  works:
    output: true
    permalink: /works/:name/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Power Family Archive"
  - scope:
      path: ""
      type: "works"
    values:
      layout: "work"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .git
  - vendor/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - setup.sh
  - install-deps.sh
  - .research_cache.json
  - .setup_state
