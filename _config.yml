title: "Albert G. Power RHA"
description: "A memorial archive dedicated to Albert George Power RHA (1881–1945), one of the foremost Irish sculptors of the twentieth century."
url: "https://albertpower.io"
baseurl: "/albert-power-rha"

author:
  name: "Power Family Archive"
  email: "archive@albertgpower.ie"

# Build
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Plugins (all GitHub Pages safe)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Collections
collections:
  works:
    output: true
    permalink: /works/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Power Family Archive"
  - scope:
      path: ""
      type: "works"
    values:
      layout: "work"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .git
